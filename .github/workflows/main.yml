name: Java CI with Maven and MySQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: thuchanh1
          MYSQL_USER: root
          MYSQL_PASSWORD: trunghn2003
        ports:
          - 3307:3306
        options: > 
          --health-cmd="mysqladmin ping --silent" 
          --health-interval=10s 
          --health-timeout=5s 
          --health-retries=3

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Wait for MySQL
      run: until mysqladmin ping -h"127.0.0.1" --silent; do sleep 1; done

    - name: Run SQL script to create table
      run: |
        sudo apt-get install -y mysql-client
        mysql -h 127.0.0.1 -P 3307 -u root -ptrunghn2003 thuchanh1 < ./db.sql

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
